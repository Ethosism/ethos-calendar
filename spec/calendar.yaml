version: "0.1.0"
name: "Ethos Calendar"
purpose: "The time layer of Ethosism: recurring practices that bind creed and language to conduct."
principle: "Formation follows recurrence."
authority:
  canon: "Ethos books and core chapters remain doctrinally primary."
  language: "Ethra can name recurring practices but is not required for participation."
  practice: "Calendar practices must remain concrete, non-coercive, and reviewable."
non_goals:
  - "Do not create a church, priesthood, or spiritual authority structure."
  - "Do not require confession to a facilitator or group."
  - "Do not replace medical, legal, therapeutic, or emergency processes."
  - "Do not turn recurrence into performance or surveillance."
  - "Do not make Ethra fluency a condition of participation."
daily_rule:
  name: "Daily Rule"
  purpose: "Make one day answerable to reality, duty, and memory."
  practices:
    - id: "attention"
      prompt: "Name one real fact that should not be avoided."
      ethos_function: "truth"
      ethra_hinge: "Ke rah na."
    - id: "duty"
      prompt: "Choose one bounded duty that can actually be carried today."
      ethos_function: "agency"
      ethra_hinge: "Na vel dev se."
    - id: "record"
      prompt: "Record one thing worth remembering or correcting."
      ethos_function: "memory"
      ethra_hinge: "Lem ga naf bi mar."
weekly_rule:
  name: "Weekly Rule"
  purpose: "Turn attention into review, repair, stewardship, service, learning, and renewal."
  days:
    - id: "attention"
      theme: "Attention"
      prompt: "What did reality ask me to see?"
    - id: "duty"
      theme: "Duty"
      prompt: "What responsibility is mine, not someone else's abstraction?"
    - id: "repair"
      theme: "Repair"
      prompt: "What harm, disorder, or unfinished apology should be addressed?"
    - id: "stewardship"
      theme: "Stewardship"
      prompt: "What resource, body, home, tool, money, or trust needs care?"
    - id: "service"
      theme: "Service"
      prompt: "Who can be concretely helped without performance or control?"
    - id: "learning"
      theme: "Learning"
      prompt: "What correction, skill, or knowledge should be added?"
    - id: "review"
      theme: "Review"
      prompt: "What should continue, stop, be repaired, or be remembered next week?"
monthly_observances:
  - id: "truth-audit"
    name: "Truth Audit"
    purpose: "Review one belief, plan, or story against evidence."
  - id: "household-review"
    name: "Household Review"
    purpose: "Review shared duties, neglected maintenance, relational strain, and practical burdens."
  - id: "stewardship-review"
    name: "Stewardship Review"
    purpose: "Review money, tools, time, body, commitments, and future obligations."
  - id: "repair-day"
    name: "Repair Day"
    purpose: "Choose one concrete repair: apology, replacement, repayment, clarification, cleanup, or structural correction."
seasonal_cycle:
  - id: "inheritance"
    season: "Season of Inheritance"
    focus: "What has been received, unfinished, damaged, or entrusted?"
  - id: "formation"
    season: "Season of Formation"
    focus: "What habits, skills, disciplines, and examples should be formed?"
  - id: "provision"
    season: "Season of Provision"
    focus: "What must be built, stored, funded, repaired, or shared?"
  - id: "courage"
    season: "Season of Courage"
    focus: "What truth, duty, or protection requires risk?"
  - id: "mercy"
    season: "Season of Mercy"
    focus: "What accountability can become repair rather than mere punishment?"
  - id: "mortality"
    season: "Season of Mortality"
    focus: "What ends, what must be grieved, and what should be put in order?"
  - id: "renewal"
    season: "Season of Renewal"
    focus: "What should begin again after review, repair, and rest?"
annual_days:
  - id: "day-of-remembrance"
    name: "Day of Remembrance"
    function: "Remember the dead, the absent, the harmed, and the inherited."
  - id: "day-of-vows"
    name: "Day of Vows"
    function: "Renew or release commitments truthfully."
  - id: "day-of-debts"
    name: "Day of Debts"
    function: "Review debts owed, debts held, obligations postponed, and repairs unpaid."
  - id: "day-of-service"
    name: "Day of Service"
    function: "Give practical help where it is needed without claiming ownership of the recipient."
  - id: "day-of-future-generations"
    name: "Day of Future Generations"
    function: "Review what present choices impose on children, descendants, institutions, and the world not yet born."
life_rites:
  - id: "naming"
    name: "Naming"
    purpose: "Welcome a person into memory, care, truth, and future responsibility."
  - id: "coming-of-age"
    name: "Coming Of Age"
    purpose: "Mark increased agency, duty, skill, and accountability."
  - id: "vocation"
    name: "Vocation"
    purpose: "Name useful work and the responsibilities carried by craft."
  - id: "marriage"
    name: "Marriage"
    purpose: "Bind public promise, private love, household duty, and future consequence."
  - id: "reconciliation"
    name: "Reconciliation"
    purpose: "Mark truth-telling, accountability, repair, and restored or clarified relationship."
  - id: "grief"
    name: "Grief"
    purpose: "Tell the truth about loss and preserve memory without denying pain."
  - id: "elder-honor"
    name: "Elder Honor"
    purpose: "Recognize age, contribution, dependence, memory, and unfinished transmission."
  - id: "death-remembrance"
    name: "Death Remembrance"
    purpose: "Remember the dead and examine what remains entrusted to the living."
quality_gates:
  - "Each practice must have a plain-language version."
  - "Each practice must state what it asks participants to do."
  - "Each practice must include boundaries against coercion and overreach."
  - "Each practice must produce visible conduct, not only sentiment."
  - "Each practice must remain compatible with the Ethos canon and governance layer."
