version: "0.1.0"
name: "Ethos Annual Observance Calendar"
purpose: "A standing annual cycle of public observances, seasons, reviews, and life-orienting days for Ethosism."
date_policy:
  calendar: "Gregorian civil calendar"
  rule: "Use fixed civil dates where possible. Use local equinoxes, solstices, and named Sundays where a movable observance is clearer."
  adaptation: "Local groups may move an observance within seven days for work, climate, safety, illness, or household need."
boundaries:
  - "Observances are not sacraments."
  - "Attendance is not a loyalty test."
  - "No observance may require public confession."
  - "No observance replaces medical, legal, therapeutic, or emergency processes."
  - "Ethra phrases may be used as hinges but Ethra fluency is never required."
seasons:
  - id: "season-inheritance"
    name: "Season of Inheritance"
    date_rule: "January 1 through February 14"
    question: "What has been received, unfinished, damaged, or entrusted?"
  - id: "season-formation"
    name: "Season of Formation"
    date_rule: "February 15 through March 31"
    question: "What habits, skills, disciplines, and examples should be formed?"
  - id: "season-provision"
    name: "Season of Provision"
    date_rule: "April 1 through May 15"
    question: "What must be built, stored, funded, repaired, or shared?"
  - id: "season-courage"
    name: "Season of Courage"
    date_rule: "May 16 through June 30"
    question: "What truth, duty, or protection requires risk?"
  - id: "season-mercy"
    name: "Season of Mercy"
    date_rule: "July 1 through August 15"
    question: "What accountability can become repair rather than mere punishment?"
  - id: "season-mortality"
    name: "Season of Mortality"
    date_rule: "August 16 through October 31"
    question: "What ends, what must be grieved, and what should be put in order?"
  - id: "season-renewal"
    name: "Season of Renewal"
    date_rule: "November 1 through December 31"
    question: "What should begin again after review, repair, and rest?"
high_observances:
  - id: "day-first-truth"
    name: "Day of First Truth"
    date_rule: "January 1"
    rank: "high"
    theme: "Begin the year by naming one fact that must not be avoided."
    practice: "Write the first fact, first duty, and first repair of the year."
  - id: "day-vows"
    name: "Day of Vows"
    date_rule: "January 7"
    rank: "high"
    theme: "Renew, revise, or release commitments truthfully."
    practice: "List active vows and mark each as keep, repair, revise, or release."
  - id: "day-formation"
    name: "Opening of Formation"
    date_rule: "February 15"
    rank: "seasonal"
    theme: "Begin the yearly formation block."
    practice: "Choose one discipline, skill, or example to practice for six weeks."
  - id: "day-renewal-equinox"
    name: "Day of Renewal"
    date_rule: "March equinox"
    rank: "seasonal"
    theme: "Review what winter taught and what spring asks to begin."
    practice: "Retire one dead pattern and begin one living duty."
  - id: "day-provision"
    name: "Day of Provision"
    date_rule: "April 1"
    rank: "seasonal"
    theme: "Ask what must be built, stored, funded, repaired, or shared."
    practice: "Review material needs, household burdens, and provision obligations."
  - id: "day-work-tools"
    name: "Day of Work And Tools"
    date_rule: "May 1"
    rank: "seasonal"
    theme: "Honor craft, tools, labor, maintenance, and useful competence."
    practice: "Repair, clean, upgrade, or retire one tool or workflow."
  - id: "day-commons"
    name: "Day of the Commons"
    date_rule: "June 1"
    rank: "seasonal"
    theme: "Review shared goods, public duties, and institutions that carry common life."
    practice: "Choose one civic, neighborhood, or shared-infrastructure service action."
  - id: "day-service-solstice"
    name: "Day of Service"
    date_rule: "June solstice"
    rank: "high"
    theme: "Use the long light for concrete help."
    practice: "Complete one useful act of service without reputation theater."
  - id: "day-courage"
    name: "Day of Courage"
    date_rule: "July 1"
    rank: "high"
    theme: "Name the truth, protection, or duty that requires risk."
    practice: "Write the risk, the reason, the boundary, and the next action."
  - id: "day-mercy-repair"
    name: "Day of Mercy And Repair"
    date_rule: "August 15"
    rank: "high"
    theme: "Move accountability toward repair where repair is possible."
    practice: "Begin one repair, restitution, clarification, or bounded mercy."
  - id: "day-measure"
    name: "Day of Measure"
    date_rule: "September equinox"
    rank: "seasonal"
    theme: "Measure truth, debts, work, care, and consequence at the balance point of the year."
    practice: "Run a midyear audit of duties kept, avoided, or distorted."
  - id: "vigil-mortality"
    name: "Vigil of Mortality"
    date_rule: "October 31"
    rank: "high"
    theme: "Face endings, limits, death, grief, and unfinished order."
    practice: "Name what is ending, what must be grieved, and what should be put in order."
  - id: "day-remembrance"
    name: "Day of Remembrance"
    date_rule: "November 1"
    rank: "high"
    theme: "Remember the dead, the absent, the harmed, and the inherited."
    practice: "Speak names, preserve one memory, and name one duty left to the living."
  - id: "day-gratitude-provision"
    name: "Day of Gratitude And Provision"
    date_rule: "Fourth Sunday of November"
    rank: "seasonal"
    theme: "Give thanks without forgetting obligation."
    practice: "Name what was received and what should now be shared."
  - id: "day-future-generations"
    name: "Day of Future Generations"
    date_rule: "December 1"
    rank: "high"
    theme: "Review what present choices impose on those not yet able to answer."
    practice: "Write one policy, household, financial, ecological, or relational duty owed forward."
  - id: "long-night-review"
    name: "Long Night of Review"
    date_rule: "December solstice"
    rank: "high"
    theme: "Let darkness become review rather than denial."
    practice: "Review the year in truth, repair, stewardship, service, learning, and memory."
  - id: "closing-record"
    name: "Closing of the Record"
    date_rule: "December 31"
    rank: "high"
    theme: "Close the year with an honest record."
    practice: "Record what was kept, what failed, what was repaired, and what must begin next."
festivals:
  - id: "festival-first-truth"
    name: "Festival of First Truth"
    date_rule: "January 1"
    tone: "solemn morning, celebratory meal"
    theme: "The year begins by telling the truth before making plans."
    gathering: "Morning truth-setting followed by a shared meal later in the day."
    customs:
      - "Light one lamp or candle before writing."
      - "Write the first fact, first duty, and first repair of the year."
      - "Share one non-private hope for clearer conduct in the coming year."
    foods:
      - "simple bread"
      - "fruit"
      - "clear water"
      - "tea or coffee"
    symbols:
      - "open page"
      - "clear water"
      - "single light"
    children: "Children name one true thing they learned and one good thing they want to practice."
    public_act: "Send one truthful clarification, thanks, apology, or commitment before the day ends."
  - id: "vow-week"
    name: "Vow Week"
    date_rule: "January 1 through January 7"
    tone: "solemn arc"
    theme: "Commitments are renewed, revised, repaired, or released."
    gathering: "Households or groups meet once during the week to review active commitments."
    customs:
      - "List active vows and duties."
      - "Mark each as keep, repair, revise, or release."
      - "Name the cost of keeping any vow that remains."
    foods:
      - "round bread"
      - "salt"
      - "shared soup"
    symbols:
      - "cord"
      - "ledger"
      - "witness seat"
    children: "Children practice the difference between a wish, a promise, and a duty."
    public_act: "Resolve one ambiguous commitment with a clear message."
  - id: "festival-formation"
    name: "Festival of Formation"
    date_rule: "Weekend nearest March equinox"
    tone: "bright, disciplined, intergenerational"
    theme: "Learning, practice, craft, mentorship, and children are honored."
    gathering: "A skill-sharing meal, lesson day, or mentorship circle."
    customs:
      - "Teach one practical skill."
      - "Honor one teacher, mentor, parent, or example."
      - "Choose one discipline to practice through the next season."
    foods:
      - "eggs"
      - "greens"
      - "seeded bread"
    symbols:
      - "seed"
      - "tool"
      - "lesson card"
    children: "Children demonstrate one skill or receive one small responsibility."
    public_act: "Offer a lesson, tutoring session, repair clinic, or public learning aid."
  - id: "commons-festival"
    name: "Commons Festival"
    date_rule: "Weekend nearest June solstice"
    tone: "public, useful, joyful"
    theme: "Shared goods, civic trust, useful work, and common life are celebrated."
    gathering: "A service project followed by a public or neighborhood meal."
    customs:
      - "Repair, clean, plant, organize, or maintain something shared."
      - "Name one institution or common good that deserves care."
      - "Eat with people outside the ordinary household circle when possible."
    foods:
      - "grilled food"
      - "seasonal fruit"
      - "shared pitchers"
    symbols:
      - "table"
      - "broom"
      - "gate"
    children: "Children help with a visible maintenance task and set the shared table."
    public_act: "Complete one neighborhood, civic, or shared-infrastructure service action."
  - id: "festival-mercy-repair"
    name: "Festival of Mercy And Repair"
    date_rule: "August 15"
    tone: "restorative, careful, hopeful"
    theme: "Accountability moves toward repair where repair is possible."
    gathering: "A repair day with private reflection and optional shared meal."
    customs:
      - "Begin one restitution, apology, replacement, cleanup, or clarification."
      - "Release one resentment that no longer protects truth or safety."
      - "Keep boundaries where reconciliation would be false or unsafe."
    foods:
      - "mended meal from leftovers"
      - "stew"
      - "bread for sharing"
    symbols:
      - "mended cloth"
      - "bridge"
      - "clean bowl"
    children: "Children repair or clean one object and learn that repair is stronger than hiding."
    public_act: "Fix, replace, return, clarify, or clean something that has been neglected."
  - id: "festival-measure"
    name: "Festival of Measure"
    date_rule: "Weekend nearest September equinox"
    tone: "harvest, accounting, gratitude"
    theme: "Provision, debts, work, care, and consequence are measured at the balance point of the year."
    gathering: "A harvest-style meal with household, project, or community accounting."
    customs:
      - "Review money, debts, promises, stored goods, and care obligations."
      - "Give thanks for provision without denying who lacks it."
      - "Share surplus where possible."
    foods:
      - "grain"
      - "root vegetables"
      - "apples"
      - "lentils or beans"
    symbols:
      - "scale"
      - "basket"
      - "ledger"
    children: "Children count, sort, store, or give part of the meal or harvest."
    public_act: "Pay, forgive, document, or materially reduce one debt or provision gap."
  - id: "remembrance-tide"
    name: "Remembrance Tide"
    date_rule: "October 31 through November 1"
    tone: "solemn, tender, memory-bearing"
    theme: "Death, ancestors, grief, memory, and unfinished duties are faced truthfully."
    gathering: "A vigil of mortality followed by a day of remembrance."
    customs:
      - "Speak names of the dead, absent, harmed, or forgotten."
      - "Tell one true memory without making the dead perfect."
      - "Name one duty that passes to the living."
    foods:
      - "dark bread"
      - "warm drink"
      - "remembered family foods"
    symbols:
      - "names"
      - "photographs or records"
      - "small lights"
    children: "Children may ask about ancestors, tell a memory, or draw a remembered place."
    public_act: "Preserve one story, document, grave, archive, photograph, or neglected memory."
  - id: "festival-future-generations"
    name: "Festival of Future Generations"
    date_rule: "December 1"
    tone: "child-honoring, long-view, protective"
    theme: "Children, descendants, ecology, institutions, and the unborn future are treated as claimants."
    gathering: "A meal or assembly centered on children, inheritance, and long-term responsibility."
    customs:
      - "Name one duty owed to children or future people."
      - "Repair or fund one thing that will outlast the current year."
      - "Ask what present convenience is borrowing from the future."
    foods:
      - "stored fruits"
      - "nuts"
      - "milk or warm drink"
      - "foods children can help prepare"
    symbols:
      - "seed jar"
      - "empty chair"
      - "sapling"
    children: "Children are asked what adults should protect, repair, or remember."
    public_act: "Plant, save, teach, fund, document, or repair something for future use."
  - id: "long-night"
    name: "Long Night"
    date_rule: "December solstice"
    tone: "quiet, candlelit, reflective"
    theme: "Darkness becomes review rather than denial."
    gathering: "A quiet winter gathering with lights, stories, review, and rest."
    customs:
      - "Turn down unnecessary light for part of the evening."
      - "Read the year record."
      - "Tell stories of endurance, repair, and mercy."
      - "Let one unresolved matter rest until it can be faced truthfully."
    foods:
      - "warm soup"
      - "baked roots"
      - "tea"
      - "spiced bread"
    symbols:
      - "candle or lamp"
      - "winter table"
      - "closed ledger"
    children: "Children hear stories and add one small light to the room."
    public_act: "Send one winter care message or provide one concrete help before year-end."
  - id: "closing-of-record"
    name: "Closing of the Record"
    date_rule: "December 31"
    tone: "honest, spare, preparatory"
    theme: "The year closes with memory rather than noise."
    gathering: "A short record-closing practice before any celebration."
    customs:
      - "Record what was kept, failed, repaired, and carried forward."
      - "Thank those who helped make repair possible."
      - "Prepare the first page for the coming year."
    foods:
      - "leftover table"
      - "clear water"
      - "one sweet thing"
    symbols:
      - "closed book"
      - "clean table"
      - "new page"
    children: "Children name one thing they learned and one thing they want to try again."
    public_act: "Archive the record and prepare the next year's first truth page."
monthly_observances:
  - id: "monthly-truth-audit"
    name: "Truth Audit"
    date_rule: "First Sunday of each month"
    practice: "Review one claim, belief, plan, or story against evidence."
  - id: "monthly-household-review"
    name: "Household Review"
    date_rule: "Second Sunday of each month"
    practice: "Clarify shared duties, maintenance, care burdens, and neglected repairs."
  - id: "monthly-repair-day"
    name: "Repair Day"
    date_rule: "Third Sunday of each month"
    practice: "Start or complete one apology, replacement, repayment, cleanup, or structural correction."
  - id: "monthly-stewardship-review"
    name: "Stewardship Review"
    date_rule: "Fourth Sunday of each month"
    practice: "Review money, time, body, tools, commitments, and future obligations."
  - id: "monthly-record-close"
    name: "Record Close"
    date_rule: "Last day of each month"
    practice: "Write what should be carried into the next month."
weekly_cycle:
  - "Attention"
  - "Duty"
  - "Repair"
  - "Stewardship"
  - "Service"
  - "Learning"
  - "Review"
